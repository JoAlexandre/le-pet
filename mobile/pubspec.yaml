name: mobile
description: "LePet - Plataforma Pet"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  dio: ^5.7.0
  internet_connection_checker: ^3.0.1
  web_socket_channel: ^3.0.2

  # State Management & DI
  provider: ^6.1.2
  get_it: ^8.0.3

  # Functional Programming
  dartz: ^0.10.1
  equatable: ^2.0.5

  # Database & Storage
  sqflite: ^2.3.0
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.3.4

  # UI & Design
  cupertino_icons: ^1.0.8
  material_design_icons_flutter: ^7.0.7296
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  fl_chart: ^0.70.2

  # Utilities
  intl: ^0.20.2
  mask_text_input_formatter: ^2.9.0
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.1

  # OAuth
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/images/mascot/
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
