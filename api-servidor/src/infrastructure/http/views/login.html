<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LePet - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      margin: 20px;
      text-align: center;
    }

    .logo h1 {
      font-size: 32px;
      color: #4A90D9;
      font-weight: 700;
    }

    .logo p {
      color: #888;
      margin-top: 4px;
      font-size: 14px;
    }

    h2 {
      font-size: 18px;
      color: #333;
      margin: 28px 0 20px;
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }

    label {
      display: block;
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 6px;
      color: #444;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper input {
      width: 100%;
      padding: 10px 40px 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: #4A90D9;
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.1);
    }

    .toggle-password {
      position: absolute;
      right: 10px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      color: #888;
    }

    .toggle-password:hover {
      color: #555;
    }

    .toggle-password svg {
      width: 20px;
      height: 20px;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: #4A90D9;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }

    .btn-login:hover {
      background: #357ABD;
    }

    .btn-login:disabled {
      background: #B0C4DE;
      cursor: not-allowed;
    }

    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      text-align: left;
    }

    .alert-error {
      background: #FEE2E2;
      color: #991B1B;
      border: 1px solid #FECACA;
    }

    .separator {
      display: flex;
      align-items: center;
      margin: 24px 0;
      gap: 12px;
    }

    .separator::before,
    .separator::after {
      content: '';
      flex: 1;
      border-top: 1px solid #eee;
    }

    .separator span {
      font-size: 13px;
      color: #999;
      white-space: nowrap;
    }

    .btn-oauth {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 11px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, box-shadow 0.2s;
      margin-bottom: 10px;
      border-color: #0000004e;
    }

    .btn-oauth:hover {
      background: #f8f9fa;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
    }

    .btn-oauth svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .oauth-message {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      background: #fed1c7;
      color: #92400E;
      border: 1px solid #FDE68A;
      text-align: center;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #aaa;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>LePet</h1>
      <p>Plataforma para cuidado animal</p>
    </div>

    <h2>Entre na sua conta</h2>

    <div id="message"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="Digite sua senha" autocomplete="current-password" required>
          <button type="button" class="toggle-password" id="toggle-password" aria-label="Mostrar senha">
            <svg id="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btn-login">Entrar</button>
    </form>

    <div class="separator">
      <span>ou continue com</span>
    </div>

    <a href="/api/v1/auth/google" class="btn-oauth">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Google
    </a>

    <a href="#" class="btn-oauth btn-oauth" onclick="showOAuthMessage('Login com Apple sera implementado em breve.'); return false;">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
        <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
      </svg>
      Apple
    </a>

    <a href="#" class="btn-oauth" onclick="showOAuthMessage('Login com Microsoft sera implementado em breve.'); return false;">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="10" height="10" fill="#F25022"/>
        <rect x="13" y="1" width="10" height="10" fill="#7FBA00"/>
        <rect x="1" y="13" width="10" height="10" fill="#00A4EF"/>
        <rect x="13" y="13" width="10" height="10" fill="#FFB900"/>
      </svg>
      Microsoft
    </a>

    <div id="oauth-message" class="oauth-message" style="display:none"></div>

    <p class="footer">Ao continuar, voce concorda com os Termos de Uso e Politica de Privacidade.</p>
  </div>

  <script>
    (function () {
      var passwordInput = document.getElementById('password');
      var toggleBtn = document.getElementById('toggle-password');
      var iconEye = document.getElementById('icon-eye');
      var iconEyeOff = document.getElementById('icon-eye-off');

      toggleBtn.addEventListener('click', function () {
        var isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        iconEye.style.display = isPassword ? 'none' : 'block';
        iconEyeOff.style.display = isPassword ? 'block' : 'none';
        toggleBtn.setAttribute('aria-label', isPassword ? 'Esconder senha' : 'Mostrar senha');
      });

      document.getElementById('login-form').addEventListener('submit', function (e) {
        e.preventDefault();

        var email = document.getElementById('email').value.trim();
        var password = passwordInput.value;

        if (!email || !password) {
          showMessage('Preencha email e senha.', 'error');
          return;
        }

        var btn = document.getElementById('btn-login');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Entrando...';

        fetch('/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password }),
        })
          .then(function (res) {
            return res.json().then(function (data) {
              return { status: res.status, data: data };
            });
          })
          .then(function (result) {
            if (result.status >= 400) {
              showMessage(result.data.message || 'Credenciais invalidas.', 'error');
              resetButton();
              return;
            }

            if (!result.data.isOnboardingComplete) {
              window.location.href = '/api/v1/onboarding?token='
                + encodeURIComponent(result.data.token)
                + '&refreshToken=' + encodeURIComponent(result.data.refreshToken);
              return;
            }

            window.location.href = '/api/v1/docs';
          })
          .catch(function () {
            showMessage('Erro de conexao. Tente novamente.', 'error');
            resetButton();
          });
      });

      function resetButton() {
        var btn = document.getElementById('btn-login');
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }

      function showMessage(text, type) {
        var el = document.getElementById('message');
        el.className = 'alert alert-' + type;
        el.textContent = text;
      }

      function showOAuthMessage(text) {
        var el = document.getElementById('oauth-message');
        el.textContent = text;
        el.style.display = 'block';
        setTimeout(function() { el.style.display = 'none'; }, 4000);
      }

      window.showOAuthMessage = showOAuthMessage;

      // Exibir erro de acesso negado a documentacao
      var params = new URLSearchParams(window.location.search);
      if (params.get('error') === 'docs_access_denied') {
        showOAuthMessage('Acesso negado: voce nao tem permissao para acessar a documentacao.');
      }
    })();
  </script>
</body>
</html>
