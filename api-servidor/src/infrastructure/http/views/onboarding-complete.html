<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LePet - Login Realizado</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
      padding: 40px;
      max-width: 480px;
      width: 100%;
      margin: 20px;
      text-align: center;
    }

    .logo h1 {
      font-size: 28px;
      color: #4A90D9;
      font-weight: 700;
    }

    .logo p {
      color: #888;
      margin-top: 4px;
      font-size: 14px;
    }

    .check-icon {
      width: 64px;
      height: 64px;
      background: #D1FAE5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 32px auto 16px;
    }

    .check-icon svg {
      width: 32px;
      height: 32px;
      stroke: #065F46;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 8px;
      color: #222;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .token-section {
      background: #F0F4FF;
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
      text-align: left;
    }

    .token-section label {
      font-weight: 600;
      font-size: 12px;
      color: #444;
      display: block;
      margin-bottom: 4px;
    }

    .token-section code {
      font-size: 11px;
      word-break: break-all;
      color: #555;
      display: block;
      max-height: 60px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>LePet</h1>
      <p>Plataforma para cuidado animal</p>
    </div>

    <div class="check-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
      </svg>
    </div>

    <h2>Login realizado com sucesso!</h2>
    <p class="subtitle">Seu cadastro ja esta completo. Voce pode usar o aplicativo normalmente.</p>

    <div class="token-section">
      <label>Seu token JWT (para uso na API):</label>
      <code id="token-display">-</code>
    </div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token');

      if (token) {
        document.getElementById('token-display').textContent = token;
      }
    })();
  </script>
</body>
</html>
